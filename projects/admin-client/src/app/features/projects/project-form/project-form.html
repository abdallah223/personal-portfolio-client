<div class="admin-content">
  <header class="admin-header">
    <div>
      <a routerLink="/projects" class="back-link">← Projects</a>
      <h1>{{ isEdit ? 'Edit Project' : 'New Project' }}</h1>
      <p>{{ isEdit ? 'Update the project details.' : 'Add a new project to your portfolio.' }}</p>
    </div>
  </header>

  @if (fetchLoading) {
    <div class="loading"><span class="spinner"></span> Loading…</div>
  } @else {
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form class="editor-form">
      <div class="form-row">
        <div class="form-group">
          <label>Title *</label>
          <input class="form-control" [(ngModel)]="title" name="title" placeholder="My Awesome Project" />
        </div>
        <div class="form-group">
          <label>Slug * (URL-friendly)</label>
          <input class="form-control" [(ngModel)]="slug" name="slug" placeholder="my-awesome-project" />
        </div>
      </div>

      <div class="form-group">
        <label>Summary *</label>
        <textarea class="form-control" [(ngModel)]="summary" name="summary" rows="2" placeholder="One-line description of the project"></textarea>
      </div>

      <div class="form-group">
        <label>Problem</label>
        <textarea class="form-control" [(ngModel)]="problem" name="problem" rows="2" placeholder="What problem does this solve?"></textarea>
      </div>

      <div class="form-group">
        <label>Solution</label>
        <textarea class="form-control" [(ngModel)]="solution" name="solution" rows="2" placeholder="How did you solve it?"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tech Stack (comma-separated)</label>
          <input class="form-control" [(ngModel)]="stack" name="stack" placeholder="React, Node.js, MongoDB" />
        </div>
        <div class="form-group">
          <label>Impact (one per line)</label>
          <input class="form-control" [(ngModel)]="impact" name="impact" placeholder="50% faster, 1000 users" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Live URL</label>
          <input class="form-control" [(ngModel)]="liveLink" name="liveLink" placeholder="https://project.com" />
        </div>
        <div class="form-group">
          <label>Repo URL</label>
          <input class="form-control" [(ngModel)]="repoLink" name="repoLink" placeholder="https://github.com/..." />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select class="form-control" [(ngModel)]="status" name="status">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
          </select>
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" [(ngModel)]="featured" name="featured" />
            Featured Project
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Cover Image</label>
        @if (previewUrl) {
          <img [src]="previewUrl" alt="Preview" class="img-preview" />
        }
        <label class="file-btn btn btn-secondary">
          {{ previewUrl ? 'Change image' : 'Upload image' }}
          <input type="file" accept="image/*" (change)="onFileChange($event)" hidden />
        </label>
        <p class="file-hint">JPG, PNG or WebP · max 5MB</p>
      </div>

      <div class="form-actions">
        <a routerLink="/projects" class="btn btn-secondary">Cancel</a>
        <button type="button" class="btn btn-primary" (click)="submit()" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> }
          {{ isEdit ? 'Save Changes' : 'Create Project' }}
        </button>
      </div>
    </form>
  }
</div>
